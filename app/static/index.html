<!DOCTYPE html>
<html class="h-full" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Radio Station</title>
    <script>window.tailwind = { config: { darkMode: 'class' } };</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
    </script>
  </head>
  <body class="h-full bg-white text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <div class="min-h-full max-w-6xl mx-auto p-4">
      <header class="flex items-center justify-between mb-4">
        <h1 class="text-2xl font-semibold">Radio Station</h1>
        <div class="flex items-center gap-2">
          <button id="themeToggle" class="px-3 py-1 rounded border border-slate-300 dark:border-slate-600">Toggle Theme</button>
          <button class="px-3 py-1 rounded bg-blue-600 text-white hover:bg-blue-700" onclick="runPipeline()">Run</button>
          <button class="px-3 py-1 rounded bg-rose-600 text-white hover:bg-rose-700" onclick="stopPipeline()">Stop</button>
          <button class="px-3 py-1 rounded border border-slate-300 dark:border-slate-600" onclick="refreshStatus()">Refresh</button>
        </div>
      </header>

      <section class="mb-6">
        <div class="mb-2 flex items-center justify-between">
          <h2 class="text-lg font-medium">Overall Status</h2>
          <span id="runBadge" class="text-sm px-2 py-0.5 rounded border border-slate-300 dark:border-slate-600">Idle</span>
        </div>
        <div class="h-3 w-full bg-slate-200 dark:bg-slate-700 rounded">
          <div id="overallBar" class="h-3 bg-emerald-500 rounded" style="width:0%"></div>
        </div>
        <div class="text-sm mt-1" id="overallText">0% (0 / 0)</div>
      </section>

      <section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div class="p-4 rounded border border-slate-200 dark:border-slate-700">
          <h3 class="font-medium mb-3">Configuration</h3>
          <form id="configForm" class="space-y-3">
            <div class="grid grid-cols-2 gap-3">
              <label class="block text-sm">Clip seconds <input id="CLIP_SECONDS" type="number" class="mt-1 w-full rounded border border-slate-300 dark:border-slate-600 bg-transparent p-1" /></label>
              <label class="block text-sm">Samples per bank <input id="SAMPLES_PER_BANK" type="number" class="mt-1 w-full rounded border border-slate-300 dark:border-slate-600 bg-transparent p-1" /></label>
              <label class="block text-sm">Number of banks <input id="NUM_BANKS" type="number" class="mt-1 w-full rounded border border-slate-300 dark:border-slate-600 bg-transparent p-1" /></label>
              <label class="block text-sm">Max retries per theme <input id="MAX_RETRIES_PER_THEME" type="number" class="mt-1 w-full rounded border border-slate-300 dark:border-slate-600 bg-transparent p-1" /></label>
              <label class="block text-sm">Search results / theme <input id="SEARCH_RESULTS_PER_THEME" type="number" class="mt-1 w-full rounded border border-slate-300 dark:border-slate-600 bg-transparent p-1" /></label>
              <label class="block text-sm">Download workers <input id="DOWNLOAD_WORKERS" type="number" class="mt-1 w-full rounded border border-slate-300 dark:border-slate-600 bg-transparent p-1" /></label>
              <label class="block text-sm">Slices / video <input id="SLICES_PER_VIDEO" type="number" class="mt-1 w-full rounded border border-slate-300 dark:border-slate-600 bg-transparent p-1" /></label>
              <label class="block text-sm">Slice stride (sec) <input id="SLICE_STRIDE_SECONDS" type="number" step="0.1" class="mt-1 w-full rounded border border-slate-300 dark:border-slate-600 bg-transparent p-1" /></label>
            </div>
            <div class="border-t border-slate-200 dark:border-slate-700 pt-3">
              <div class="font-medium mb-2">Downloader (aria2c)</div>
              <div class="grid grid-cols-2 gap-3">
                <label class="inline-flex items-center gap-2 text-sm"><input id="ARIA2C_ENABLED" type="checkbox" class="rounded" /> Enable aria2c</label>
                <label class="block text-sm">Conn per server <input id="ARIA2C_CONN_PER_SERVER" type="number" class="mt-1 w-full rounded border border-slate-300 dark:border-slate-600 bg-transparent p-1" /></label>
                <label class="block text-sm">Split <input id="ARIA2C_SPLIT" type="number" class="mt-1 w-full rounded border border-slate-300 dark:border-slate-600 bg-transparent p-1" /></label>
                <label class="block text-sm">Chunk size <input id="ARIA2C_CHUNK_SIZE" type="text" class="mt-1 w-full rounded border border-slate-300 dark:border-slate-600 bg-transparent p-1" /></label>
              </div>
            </div>
          <div class="border-t border-slate-200 dark:border-slate-700 pt-3">
            <div class="font-medium mb-2">Scoring (CLAP)</div>
            <label class="inline-flex items-center gap-2 text-sm"><input id="SCORING_ENABLED" type="checkbox" class="rounded" /> Enable scoring</label>
            <label class="block text-sm mt-2">CLAP model path (optional) <input id="CLAP_MODEL_PATH" type="text" class="mt-1 w-full rounded border border-slate-300 dark:border-slate-600 bg-transparent p-1" /></label>
            <label class="block text-sm mt-2">Min similarity (0-1) <input id="SCORING_MIN_SIMILARITY" type="number" step="0.01" min="0" max="1" class="mt-1 w-full rounded border border-slate-300 dark:border-slate-600 bg-transparent p-1" /></label>
          </div>
            <button type="button" onclick="save()" class="px-3 py-1 rounded bg-emerald-600 text-white hover:bg-emerald-700">Save</button>
          </form>
        </div>
        <div class="p-4 rounded border border-slate-200 dark:border-slate-700">
          <h3 class="font-medium mb-3">Themes</h3>
          <div id="themes" class="grid grid-cols-2 gap-2"></div>
          <div class="mt-4">
            <div class="font-medium mb-2">Prompts (name: prompt per line)</div>
            <textarea id="prompts" rows="12" class="w-full rounded border border-slate-300 dark:border-slate-600 bg-transparent p-2"></textarea>
          </div>
        </div>
      </section>

      <section class="p-4 rounded border border-slate-200 dark:border-slate-700">
        <h3 class="font-medium mb-3">Per-Theme Progress</h3>
        <div id="perTheme"></div>
        <div class="mt-6">
          <h4 class="font-medium mb-2">Recent Activity</h4>
          <div id="logList" class="text-xs space-y-1 max-h-48 overflow-auto border border-slate-200 dark:border-slate-700 rounded p-2 bg-slate-50 dark:bg-slate-800/40"></div>
        </div>
        <pre id="rawStatus" class="whitespace-pre-wrap text-xs mt-4 hidden"></pre>
      </section>
    </div>

    <script>
      let statusTimer = null;
      function setTheme(dark) {
        if (dark) {
          document.documentElement.classList.add('dark');
          localStorage.theme = 'dark';
        } else {
          document.documentElement.classList.remove('dark');
          localStorage.theme = 'light';
        }
      }
      document.addEventListener('click', (e) => {
        if (e.target && e.target.id === 'themeToggle') {
          setTheme(!document.documentElement.classList.contains('dark'))
        }
      });

      function renderPerTheme(progress) {
        const container = document.getElementById('perTheme');
        container.innerHTML = '';
        if (!progress) return;
        const { themes, filled, target_per_bank } = progress;
        themes.forEach(t => {
          const cnt = filled?.[t] || 0;
          const pct = Math.min(100, Math.round(100 * cnt / (target_per_bank || 1)));
          const row = document.createElement('div');
          row.className = 'mb-3';
          row.innerHTML = `
            <div class="flex justify-between text-sm mb-1"><span>${t}</span><span>${cnt} / ${target_per_bank} (${pct}%)</span></div>
            <div class="h-2 w-full bg-slate-200 dark:bg-slate-700 rounded">
              <div class="h-2 bg-blue-500 rounded" style="width:${pct}%"></div>
            </div>`;
          container.appendChild(row);
        });
      }

      function renderOverall(progress, running) {
        const badge = document.getElementById('runBadge');
        badge.textContent = running ? 'Running' : 'Idle';
        badge.className = 'text-sm px-2 py-0.5 rounded ' + (running ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300' : 'border border-slate-300 dark:border-slate-600');
        if (!progress) {
          document.getElementById('overallBar').style.width = '0%';
          document.getElementById('overallText').textContent = '0% (0 / 0)';
          return;
        }
        const pct = progress.percent || 0;
        const filled = progress.overall_filled || 0;
        const target = progress.overall_target || 0;
        document.getElementById('overallBar').style.width = pct + '%';
        document.getElementById('overallText').textContent = `${pct}% (${filled} / ${target})`;
      }

      async function load() {
        const resp = await fetch('/config');
        const cfg = await resp.json();
        const numericKeys = ['CLIP_SECONDS','SAMPLES_PER_BANK','NUM_BANKS','MAX_RETRIES_PER_THEME','SEARCH_RESULTS_PER_THEME','DOWNLOAD_WORKERS','SLICES_PER_VIDEO','SLICE_STRIDE_SECONDS','ARIA2C_CONN_PER_SERVER','ARIA2C_SPLIT','SCORING_MIN_SIMILARITY'];
        for (const key of numericKeys) document.getElementById(key).value = cfg[key];
        document.getElementById('ARIA2C_CHUNK_SIZE').value = cfg['ARIA2C_CHUNK_SIZE'];
        document.getElementById('CLAP_MODEL_PATH').value = cfg['CLAP_MODEL_PATH'] || '';
        document.getElementById('ARIA2C_ENABLED').checked = cfg['ARIA2C_ENABLED'] === '1';
        document.getElementById('SCORING_ENABLED').checked = cfg['SCORING_ENABLED'] === '1';
        const themesDiv = document.getElementById('themes');
        themesDiv.innerHTML = '';
        cfg.themes.forEach((t, idx) => {
          const div = document.createElement('div');
          div.className = 'text-sm';
          div.innerHTML = `<label class="block">Theme ${idx+1}<input id="THEME${idx+1}" class="mt-1 w-full rounded border border-slate-300 dark:border-slate-600 bg-transparent p-1" value="${t}"></label>`;
          themesDiv.appendChild(div);
        });
        document.getElementById('prompts').value = (cfg.prompts || []).map(p => `${p.name}: ${p.prompt}`).join('\n');
        refreshStatus();
      }

      async function save() {
        const payload = {};
        const numericKeys = ['CLIP_SECONDS','SAMPLES_PER_BANK','NUM_BANKS','MAX_RETRIES_PER_THEME','SEARCH_RESULTS_PER_THEME','DOWNLOAD_WORKERS','SLICES_PER_VIDEO','SLICE_STRIDE_SECONDS','ARIA2C_CONN_PER_SERVER','ARIA2C_SPLIT','SCORING_MIN_SIMILARITY'];
        for (const key of numericKeys) payload[key] = document.getElementById(key).value;
        payload['ARIA2C_CHUNK_SIZE'] = document.getElementById('ARIA2C_CHUNK_SIZE').value;
        payload['CLAP_MODEL_PATH'] = document.getElementById('CLAP_MODEL_PATH').value;
        payload['ARIA2C_ENABLED'] = document.getElementById('ARIA2C_ENABLED').checked ? '1' : '0';
        payload['SCORING_ENABLED'] = document.getElementById('SCORING_ENABLED').checked ? '1' : '0';
        const themes = [];
        for (let i=1; i<=16; i++) {
          themes.push(document.getElementById(`THEME${i}`).value);
        }
        payload.themes = themes;
        const lines = document.getElementById('prompts').value.split('\n').filter(l => l.trim());
        payload.prompts = lines.map(line => {
          const [name, ...rest] = line.split(':');
          return {name: name.trim(), prompt: rest.join(':').trim()};
        });
        await fetch('/config', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
        alert('Saved');
      }

      async function runPipeline() {
        const resp = await fetch('/run', { method:'POST' });
        const data = await resp.json();
        if (data.status === 'started' || data.status === 'already_running') startAutoRefresh();
        refreshStatus();
      }
      function startAutoRefresh() {
        if (statusTimer) return;
        statusTimer = setInterval(refreshStatus, 1500);
      }
      function stopAutoRefresh() {
        if (statusTimer) { clearInterval(statusTimer); statusTimer = null; }
      }
      async function refreshStatus() {
        const resp = await fetch('/run/status');
        const data = await resp.json();
        const running = !!data.running;
        const progress = data.progress || data.last_result; // fallback
        renderOverall(progress, running);
        renderPerTheme(progress);
        document.getElementById('rawStatus').textContent = JSON.stringify(data, null, 2);
        const logDiv = document.getElementById('logList');
        logDiv.innerHTML = '';
        (data.logs || []).slice(-200).forEach(line => {
          const div = document.createElement('div');
          div.textContent = line;
          logDiv.appendChild(div);
        });
        if (!running) stopAutoRefresh(); else startAutoRefresh();
      }
      async function stopPipeline() {
        const resp = await fetch('/run/stop', { method:'POST' });
        await resp.json();
        refreshStatus();
      }

      load();
    </script>
  </body>
  </html>
